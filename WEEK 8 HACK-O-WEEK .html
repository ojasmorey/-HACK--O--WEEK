<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photography Gallery</title>

<style>

:root{
    --bg:#f5f7fb;
    --text:#1e293b;
}

*{
    box-sizing:border-box;
}

body{
    margin:0;
    font-family:system-ui, sans-serif;
    background:var(--bg);
    color:var(--text);
    padding:30px 15px;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

.gallery{
    max-width:1000px;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:15px;
}

.gallery img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    cursor:pointer;
    transition:transform .3s;
}

.gallery img:hover{
    transform:scale(1.05);
}

/* Lightbox */

.lightbox{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.85);
    display:none;
    justify-content:center;
    align-items:center;
}

.lightbox img{
    max-width:90%;
    max-height:85%;
    border-radius:10px;
}

.close{
    position:absolute;
    top:25px;
    right:40px;
    font-size:35px;
    color:white;
    cursor:pointer;
}

/* Tablet */

@media(max-width:768px){

.gallery{
grid-template-columns:repeat(2,1fr);
}

}

/* Mobile */

@media(max-width:480px){

.gallery{
grid-template-columns:1fr;
}

.gallery img{
height:220px;
}

}

</style>
</head>

<body>

<h1>Photography Gallery</h1>

<div class="gallery">

<img src="https://picsum.photos/id/1015/600/400" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1016/600/400" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1018/600/400" onclick="openLightbox(this)">

<img src="https://picsum.photos/id/1020/600/400" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1024/600/400" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1027/600/400" onclick="openLightbox(this)">

<img src="https://picsum.photos/id/1035/600/400" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1043/600/400" onclick="openLightbox(this)">
<img src="https://picsum.photos/id/1050/600/400" onclick="openLightbox(this)">

</div>


<div class="lightbox" id="lightbox">
<span class="close" onclick="closeLightbox()">&times;</span>
<img id="lightbox-img">
</div>

<script>

const lightbox=document.getElementById("lightbox");
const lightboxImg=document.getElementById("lightbox-img");

function openLightbox(img){

lightbox.style.display="flex";
lightboxImg.src=img.src;

}

function closeLightbox(){

lightbox.style.display="none";

}

lightbox.addEventListener("click",(e)=>{

if(e.target===lightbox){
closeLightbox();
}

});

</script>

</body>
</html>
