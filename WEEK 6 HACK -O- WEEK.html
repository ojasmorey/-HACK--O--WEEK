<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Classroom Quiz - 5 Questions</title>
    <style>
        /* Base Styles */
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            padding: 40px 20px;
            margin: 0;
        }

        .quiz-container {
            background: #ffffff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 650px;
            width: 100%;
        }

        h1 {
            color: #1a73e8;
            text-align: center;
            border-bottom: 2px solid #f0f2f5;
            padding-bottom: 15px;
        }

        /* Question Blocks */
        .question-block {
            margin-bottom: 25px;
            padding: 15px;
            border-radius: 8px;
            transition: background 0.3s;
        }

        .question-text {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 12px;
            display: block;
        }

        /* Options */
        .options label {
            display: block;
            padding: 10px;
            margin: 5px 0;
            background: #f8f9fa;
            border: 1px solid #dee2e6;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .options label:hover {
            background: #e8f0fe;
            border-color: #1a73e8;
        }

        input[type="radio"] {
            margin-right: 10px;
        }

        /* Action Area */
        .controls {
            text-align: center;
            margin-top: 30px;
        }

        button {
            background-color: #1a73e8;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background-color: #1557b0;
        }

        /* Result Display */
        #result-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none; /* Hidden until submission */
        }

        .score-pass { background: #e6fffa; color: #234e52; border: 1px solid #b2f5ea; }
        .score-fail { background: #fff5f5; color: #822727; border: 1px solid #feb2b2; }
    </style>
</head>
<body>

<div class="quiz-container">
    <h1>General Knowledge Quiz</h1>
    
    <form id="quizForm">
        <div class="question-block">
            <span class="question-text">1. Which planet is known as the "Red Planet"?</span>
            <div class="options">
                <label><input type="radio" name="q1" value="a" required> Venus</label>
                <label><input type="radio" name="q1" value="b"> Mars</label>
                <label><input type="radio" name="q1" value="c"> Jupiter</label>
            </div>
        </div>

        <div class="question-block">
            <span class="question-text">2. What is the largest ocean on Earth?</span>
            <div class="options">
                <label><input type="radio" name="q2" value="a"> Atlantic Ocean</label>
                <label><input type="radio" name="q2" value="b"> Indian Ocean</label>
                <label><input type="radio" name="q2" value="c"> Pacific Ocean</label>
            </div>
        </div>

        <div class="question-block">
            <span class="question-text">3. How many continents are there on Earth?</span>
            <div class="options">
                <label><input type="radio" name="q3" value="a"> 5</label>
                <label><input type="radio" name="q3" value="b"> 6</label>
                <label><input type="radio" name="q3" value="c"> 7</label>
            </div>
        </div>

        <div class="question-block">
            <span class="question-text">4. Which gas do plants primarily absorb from the atmosphere?</span>
            <div class="options">
                <label><input type="radio" name="q4" value="a"> Oxygen</label>
                <label><input type="radio" name="q4" value="b"> Carbon Dioxide</label>
                <label><input type="radio" name="q4" value="c"> Nitrogen</label>
            </div>
        </div>

        <div class="question-block">
            <span class="question-text">5. What is the capital city of France?</span>
            <div class="options">
                <label><input type="radio" name="q5" value="a"> Berlin</label>
                <label><input type="radio" name="q5" value="b"> Madrid</label>
                <label><input type="radio" name="q5" value="c"> Paris</label>
            </div>
        </div>

        <div class="controls">
            <button type="submit">Submit Quiz</button>
        </div>
    </form>

    <div id="result-area"></div>
</div>

<script>
    const quizForm = document.getElementById('quizForm');
    const resultArea = document.getElementById('result-area');

    // Correct Answers Key
    const correctAnswers = {
        q1: 'b',
        q2: 'c',
        q3: 'c',
        q4: 'b',
        q5: 'c'
    };

    quizForm.addEventListener('submit', function(e) {
        e.preventDefault(); // Prevent page reload
        
        let score = 0;
        const formData = new FormData(quizForm);

        // Calculate score
        for (let [question, answer] of Object.entries(correctAnswers)) {
            if (formData.get(question) === answer) {
                score++;
            }
        }

        // Display results
        resultArea.style.display = 'block';
        const percentage = (score / 5) * 100;

        if (score >= 3) {
            resultArea.className = 'score-pass';
            resultArea.innerHTML = `<h2>Great Job!</h2><p>You scored <strong>${score}/5</strong> (${percentage}%).</p>`;
        } else {
            resultArea.className = 'score-fail';
            resultArea.innerHTML = `<h2>Keep Practicing!</h2><p>You scored <strong>${score}/5</strong> (${percentage}%).</p>`;
        }

        // Scroll to results
        resultArea.scrollIntoView({ behavior: 'smooth' });
    });
</script>

</body>
</html>
